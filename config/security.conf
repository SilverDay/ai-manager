# Production Security Configuration
# AI Governance Platform - Security Hardening

# Fail2ban jail configuration for nginx
# Place this in /etc/fail2ban/jail.d/aigov.conf

[nginx-noscript]
enabled = true
port = http,https
filter = nginx-noscript
logpath = /var/log/nginx/access.log
banaction = ufw
maxretry = 6
bantime = 86400
findtime = 60

[nginx-badbots]
enabled = true
port = http,https
filter = nginx-badbots
logpath = /var/log/nginx/access.log
banaction = ufw
maxretry = 2
bantime = 86400
findtime = 60

[nginx-noproxy]
enabled = true
port = http,https
filter = nginx-noproxy
logpath = /var/log/nginx/access.log
banaction = ufw
maxretry = 2
bantime = 86400
findtime = 60

[nginx-nohome]
enabled = true
port = http,https
filter = nginx-nohome
logpath = /var/log/nginx/access.log
banaction = ufw
maxretry = 2
bantime = 86400
findtime = 60

[nginx-req-limit]
enabled = true
port = http,https
filter = nginx-req-limit
logpath = /var/log/nginx/error.log
banaction = ufw
maxretry = 10
bantime = 600
findtime = 60

# Additional security configurations

# UFW Firewall Rules
# sudo ufw --force enable
# sudo ufw default deny incoming
# sudo ufw default allow outgoing
# sudo ufw allow 22
# sudo ufw allow 80
# sudo ufw allow 443
# sudo ufw limit ssh

# SSH Security
# Add to /etc/ssh/sshd_config:
# PermitRootLogin no
# PasswordAuthentication no
# PubkeyAuthentication yes
# Protocol 2
# MaxAuthTries 3
# ClientAliveInterval 300
# ClientAliveCountMax 2

# File Permission Security
# /srv/vhosts/aim.silverday.de/.env: 600 (www-data:www-data)
# /var/app/storage: 750 (www-data:www-data)
# /var/log/aigov: 750 (www-data:www-data)
# /var/backups/aigov: 700 (root:root)

