name: Frontend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_call:

defaults:
  run:
    working-directory: ./frontend

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check package-lock.json is up to date
        run: |
          if [ -f package-lock.json ]; then
            npm ci --dry-run
          else
            echo "Warning: package-lock.json not found"
            exit 1
          fi

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npx prettier --check "src/**/*.{js,vue,ts,json,css,scss,md}"

      - name: Type check (if TypeScript)
        run: |
          if [ -f tsconfig.json ]; then
            npm run type-check
          else
            echo "No TypeScript config found, skipping type check"
          fi

      - name: Run unit tests
        run: |
          if npm run | grep -q "test:unit"; then
            npm run test:unit
          else
            echo "No unit tests configured yet"
          fi

      - name: Build application
        run: npm run build

      - name: Check build size
        run: |
          echo "Build size analysis:"
          if [ -d dist ]; then
            du -sh dist/
            find dist/ -name "*.js" -o -name "*.css" | head -10 | xargs ls -lh
          fi

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          # Run audit and capture exit code
          npm audit --audit-level=moderate --production || audit_exit_code=$?

          # Display full audit report
          echo "Full audit report:"
          npm audit --production || true

          # Exit with original audit code
          if [ ${audit_exit_code:-0} -ne 0 ]; then
            echo "Security vulnerabilities found!"
            exit $audit_exit_code
          fi

      - name: Check for known vulnerabilities
        run: |
          # Additional check using audit for CI
          npm audit --audit-level=high --production --parseable | head -20

  dependency-check:
    name: Dependency Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for package-lock.json
        run: |
          if [ ! -f package-lock.json ]; then
            echo "Error: package-lock.json is missing"
            echo "Run 'npm install' locally and commit the lock file"
            exit 1
          fi

      - name: Validate package.json and package-lock.json
        run: |
          npm install --package-lock-only --no-fund --no-audit
          if ! git diff --quiet package-lock.json; then
            echo "Error: package-lock.json is out of sync with package.json"
            echo "Run 'npm install' locally and commit the updated lock file"
            git diff package-lock.json
            exit 1
          fi

      - name: Check for unused dependencies
        run: |
          npx depcheck --ignores="@vitejs/*,eslint-*,prettier,@typescript-eslint/*" || echo "Some unused dependencies found (review recommended)"