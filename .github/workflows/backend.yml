name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - '.github/workflows/backend.yml'
  workflow_call:

defaults:
  run:
    working-directory: ./backend

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: [8.3]

    services:
      mysql:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: aigov_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, curl, dom, libxml, zip
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-suggest --no-interaction

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Check Composer lock file is up to date
        run: composer install --dry-run

      - name: Run PHP CS Fixer (dry run)
        run: |
          if [ -f .php-cs-fixer.php ]; then
            vendor/bin/php-cs-fixer fix --dry-run --diff --verbose
          else
            echo "PHP CS Fixer config not found - skipping"
          fi

      - name: Run PHPStan static analysis
        run: |
          if [ -f phpstan.neon ] || [ -f phpstan.neon.dist ]; then
            vendor/bin/phpstan analyse --no-progress
          else
            echo "PHPStan config not found - skipping"
          fi

      - name: Check PSR-12 compliance
        run: |
          # Basic PSR-12 checks using PHP native tools
          find src/ -name "*.php" -exec php -l {} \; | grep -v "No syntax errors detected" && exit 1 || echo "Syntax check passed"

      - name: Setup test environment
        run: |
          # Copy environment file for testing
          if [ -f .env.testing ]; then
            cp .env.testing .env
          else
            cp .env.example .env
            # Update test database settings
            sed -i 's/^DB_DATABASE=.*/DB_DATABASE=aigov_test/' .env
            sed -i 's/^DB_USERNAME=.*/DB_USERNAME=test_user/' .env
            sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=test_password/' .env
            sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
            # Set a test JWT secret (32+ characters required)
            sed -i 's/^JWT_SECRET=.*/JWT_SECRET=test_jwt_secret_for_ci_32_chars_min/' .env
            # Debug output to verify configuration
            echo "DEBUG: Environment configuration:"
            grep -E "^(DB_USERNAME|DB_PASSWORD|DB_HOST|DB_DATABASE|JWT_SECRET)=" .env
            # Set test environment variables
            sed -i 's/APP_ENV=.*/APP_ENV=testing/' .env
            sed -i 's/APP_DEBUG=.*/APP_DEBUG=true/' .env
          fi

      - name: Wait for MariaDB
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u test_user -ptest_password; then
              break
            fi
            echo "Waiting for MariaDB... ($i/30)"
            sleep 2
          done

      - name: Run database migrations
        run: |
          cd ..
          php scripts/migrate.php

      - name: Run database seeds
        run: |
          cd ..
          php scripts/seed.php

      - name: Run PHPUnit tests
        run: |
          if [ -f phpunit.xml ] || [ -f phpunit.xml.dist ]; then
            vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml
          else
            echo "PHPUnit config not found - tests not configured yet"
          fi

      - name: Upload coverage reports
        if: matrix.php-version == '8.3'
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-dev --no-progress --no-interaction

      - name: Run Composer audit
        run: |
          # Check for known security vulnerabilities
          composer audit --format=json > audit-report.json || audit_exit_code=$?

          # Display human-readable report
          echo "Security audit report:"
          composer audit || true

          # Check exit code
          if [ ${audit_exit_code:-0} -ne 0 ]; then
            echo "Security vulnerabilities found!"
            exit $audit_exit_code
          fi

      - name: Check for hardcoded secrets
        run: |
          # Simple pattern matching for common secret patterns
          echo "Scanning for potential hardcoded secrets..."

          # Check for common secret patterns (basic scan)
          if grep -r -E "(password|secret|key|token)\s*=\s*['\"][^'\"]{8,}" src/ 2>/dev/null; then
            echo "WARNING: Potential hardcoded secrets found!"
            echo "Please review the above matches"
            # Don't fail CI for this basic check, just warn
          else
            echo "No obvious hardcoded secrets detected"
          fi

          # Check for .env files in src (should not be there)
          if find src/ -name ".env*" | grep -q .; then
            echo "ERROR: .env files found in src/ directory!"
            find src/ -name ".env*"
            exit 1
          fi

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Check file permissions
        run: |
          # Ensure no executable PHP files (security best practice)
          if find src/ -name "*.php" -executable; then
            echo "ERROR: Executable PHP files found (security risk)"
            exit 1
          fi

      - name: Check for TODO/FIXME comments
        run: |
          echo "Checking for TODO/FIXME comments:"
          grep -r -n "TODO\|FIXME\|XXX\|HACK" src/ || echo "No TODO/FIXME comments found"

      - name: Validate PSR-4 autoloading
        run: |
          # Check if autoloader is properly configured
          composer dumpautoload --optimize

          # Basic namespace validation (simplified)
          echo "Checking PSR-4 namespace compliance..."
          find src/ -name "*.php" -exec grep -l "^namespace App" {} \; | wc -l