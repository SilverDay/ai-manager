name: Security Scan

on:
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of scan to run'
        required: true
        default: 'full'
        type: choice
        options:
        - full
        - dependencies-only
        - secrets-only

jobs:
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'dependencies-only' || github.event.schedule

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PHP dependencies
        working-directory: ./backend
        run: composer install --no-dev --prefer-dist --no-progress --no-interaction

      - name: Install Node.js dependencies
        working-directory: ./frontend
        run: npm ci --production

      - name: Run PHP security audit
        working-directory: ./backend
        run: |
          echo "Running PHP dependency security audit..."
          composer audit --format=json > php-audit.json || audit_exit_code=$?

          echo "PHP Audit Results:"
          composer audit || true

          if [ ${audit_exit_code:-0} -ne 0 ]; then
            echo "PHP security vulnerabilities detected!"
            exit 1
          fi

      - name: Run Node.js security audit
        working-directory: ./frontend
        run: |
          echo "Running Node.js dependency security audit..."
          npm audit --audit-level=moderate --production || audit_exit_code=$?

          if [ ${audit_exit_code:-0} -ne 0 ]; then
            echo "Node.js security vulnerabilities detected!"
            exit 1
          fi

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: security-audit-reports
          path: |
            backend/php-audit.json
            frontend/npm-audit.json
          retention-days: 30

  secrets-scan:
    name: Secrets and Configuration Scan
    runs-on: ubuntu-latest
    if: github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'secrets-only' || github.event.schedule

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install PHP dependencies
        working-directory: ./backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run comprehensive security audit
        run: php scripts/security-audit.php

      - name: Advanced secret scanning
        run: |
          echo "Scanning for potential secrets and sensitive data..."

          # Check for common secret patterns
          secret_patterns=(
            "password\s*=\s*[\"'][^\"']{8,}[\"']"
            "api[_-]?key\s*[=:]\s*[\"'][^\"']{16,}[\"']"
            "secret\s*[=:]\s*[\"'][^\"']{16,}[\"']"
            "private[_-]?key\s*[=:]\s*[\"'][^\"']{32,}[\"']"
            "jwt[_-]?secret\s*[=:]\s*[\"'][^\"']{16,}[\"']"
            "database[_-]?password\s*[=:]\s*[\"'][^\"']{6,}[\"']"
          )

          found_secrets=false
          for pattern in "${secret_patterns[@]}"; do
            if grep -r -i -E "$pattern" backend/src/ frontend/src/ scripts/ 2>/dev/null; then
              echo "WARNING: Potential secret pattern found: $pattern"
              found_secrets=true
            fi
          done

          # Check for .env files in wrong locations
          if find . -name ".env" -not -path "./.git/*" | grep -v "^\./\.env$" | grep -v "\.env\.example"; then
            echo "ERROR: .env files found in unexpected locations!"
            exit 1
          fi

          if [ "$found_secrets" = true ]; then
            echo "Potential secrets found - please review"
            # Don't fail CI for potential secrets, just warn
          else
            echo "✅ No obvious secrets detected"
          fi

      - name: Check file permissions and ownership
        run: |
          echo "Checking file security..."

          # Find world-writable files
          world_writable=$(find . -type f -perm -002 -not -path "./.git/*" | head -10)
          if [ -n "$world_writable" ]; then
            echo "WARNING: World-writable files found:"
            echo "$world_writable"
          fi

          # Find executable scripts that might be risky
          executable_php=$(find . -name "*.php" -executable -not -path "./.git/*" -not -path "./scripts/*")
          if [ -n "$executable_php" ]; then
            echo "WARNING: Executable PHP files found outside scripts directory:"
            echo "$executable_php"
          fi

          echo "✅ File security check completed"

  security-report:
    name: Security Report
    runs-on: ubuntu-latest
    needs: [dependency-scan, secrets-scan]
    if: always() && (github.event.schedule || github.event.inputs.scan_type == 'full')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download audit reports
        uses: actions/download-artifact@v3
        with:
          name: security-audit-reports
          path: ./reports
        continue-on-error: true

      - name: Generate security summary
        run: |
          echo "# Security Scan Summary" > security-summary.md
          echo "" >> security-summary.md
          echo "**Scan Date:** $(date -u)" >> security-summary.md
          echo "**Repository:** ${{ github.repository }}" >> security-summary.md
          echo "**Commit:** ${{ github.sha }}" >> security-summary.md
          echo "" >> security-summary.md

          echo "## Scan Results" >> security-summary.md
          echo "" >> security-summary.md

          if [ "${{ needs.dependency-scan.result }}" = "success" ]; then
            echo "✅ **Dependency Scan:** PASSED" >> security-summary.md
          else
            echo "❌ **Dependency Scan:** FAILED" >> security-summary.md
          fi

          if [ "${{ needs.secrets-scan.result }}" = "success" ]; then
            echo "✅ **Secrets Scan:** PASSED" >> security-summary.md
          else
            echo "❌ **Secrets Scan:** FAILED" >> security-summary.md
          fi

          echo "" >> security-summary.md
          echo "## Next Steps" >> security-summary.md
          echo "" >> security-summary.md
          echo "- Review any failed scans above" >> security-summary.md
          echo "- Check downloaded artifacts for detailed reports" >> security-summary.md
          echo "- Run \`php scripts/security-audit.php\` locally for full analysis" >> security-summary.md
          echo "- Update dependencies if vulnerabilities found" >> security-summary.md

      - name: Upload security summary
        uses: actions/upload-artifact@v3
        with:
          name: security-summary
          path: security-summary.md
          retention-days: 90